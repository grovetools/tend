# yaml-language-server: $schema=https://raw.githubusercontent.com/mattsolo1/grove-docgen/main/schema/docgen.config.schema.json
enabled: true
title: grove-tend
description: A scenario-based, workspace-aware testing framework for Go CLIs and TUIs.
category: Testing
