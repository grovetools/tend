title: "Grove Tend"
description: "A Go library for creating powerful, scenario-based end-to-end testing frameworks."
category: "Core Libraries"
enabled: true
settings:
  output_dir: docs
  rules_file: docs.rules
  structured_output_file: pkg/docs/docs.json
  system_prompt: default
  model: gemini-2.5-pro
  regeneration_mode: reference
readme:
  generate_toc: true
  template: docs/README.md.tpl
  output: README.md
  source_section: overview
  strip_lines: 2
sections:
  - name: "overview"
    title: "Overview"
    order: 1
    prompt: "prompts/01-overview.md"
    output: "01-overview.md"
    agg_strip_lines: 2
  - name: "examples"
    title: "Examples"
    order: 2
    prompt: "prompts/02-examples.md"
    output: "02-examples.md"
  - name: "conventions"
    title: "Conventions"
    order: 3
    prompt: "prompts/03-conventions.md"
    output: "03-conventions.md"
