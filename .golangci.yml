linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gosec
    - gofumpt
    - goimports
    - misspell
    - unconvert

linters-settings:
  gofumpt:
    extra-rules: true
  goimports:
    local-prefixes: github.com/grovetools/tend
  staticcheck:
    checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]

run:
  allow-parallel-runners: true  timeout: 5m
  build-tags:
    - integration

issues:
  exclude-dirs:
    - vendor
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
    - text: "unused-parameter"
      linters:
        - revive
    - text: "interface{}"
      linters:
        - staticcheck
